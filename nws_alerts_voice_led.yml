blueprint:
  name: NWS Weather Alerts - Voice Announcements & Warning Lights
  description: >
    Configurable National Weather Service alert automation for Home Assistant.
    Announces selected NWS alert types on one or more Home Assistant Voice / Assist satellites
    and flashes one or more light entities, such as WLED strips, RGB bulbs, or basic smart bulbs.
    Supports optional helper toggle control, alert-type filtering, serious-alert occupancy bypass,
    optional announcement volume control, optional custom preannounce sound, selectable light flash
    mode, customizable alert colors, optional mobile push notifications, and automatic light state restore.
  domain: automation
  homeassistant:
    min_version: 2024.6.0

  input:
    core_settings:
      name: Core Settings
      icon: mdi:cog
      description: >
        Required entities and the NWS alert attribute used by this automation.
      input:
        nws_alert_sensor:
          name: NWS Alert Sensor
          description: >
            The NWS Alerts sensor whose state is the active alert count.
          selector:
            entity:
              domain: sensor

        alert_attribute:
          name: Alert List Attribute
          description: >
            Attribute on the NWS sensor that contains the alert list.
            For the NWS Alerts integration, this is commonly "Alerts".
          default: Alerts
          selector:
            text:

        voice_satellites:
          name: Voice Assist Satellites
          description: >
            One or more Home Assistant Voice / Assist satellite entities to announce on.
          selector:
            entity:
              domain: assist_satellite
              multiple: true

    alert_zone_1:
      name: Alert Zone 1
      icon: mdi:map-marker-radius
      collapsed: false
      description: >
        Optional warning light zone. Enable this zone, select its presence sensor, and select
        one or more lights that should flash when this zone is occupied.
      input:
        zone1_enabled:
          name: Enable Alert Zone 1
          default: false
          selector:
            boolean:

        zone1_presence_sensor:
          name: Zone 1 Presence / Occupancy Sensor
          description: >
            Optional. Presence or occupancy sensor for this zone. If left blank, this zone is
            treated as always occupied and its lights can flash whenever a matching alert triggers.
            If selected, zone lights flash when this sensor is on, unless the alert is configured
            to bypass occupancy.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        zone1_lights:
          name: Zone 1 Warning Lights
          description: >
            One or more lights assigned to this zone.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    alert_zone_2:
      name: Alert Zone 2
      icon: mdi:map-marker-radius-outline
      collapsed: true
      description: >
        Optional warning light zone. Enable this zone, select its presence sensor, and select
        one or more lights that should flash when this zone is occupied.
      input:
        zone2_enabled:
          name: Enable Alert Zone 2
          default: false
          selector:
            boolean:

        zone2_presence_sensor:
          name: Zone 2 Presence / Occupancy Sensor
          description: >
            Optional. Presence or occupancy sensor for this zone. If left blank, this zone is
            treated as always occupied and its lights can flash whenever a matching alert triggers.
            If selected, zone lights flash when this sensor is on, unless the alert is configured
            to bypass occupancy.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        zone2_lights:
          name: Zone 2 Warning Lights
          description: >
            One or more lights assigned to this zone.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    alert_zone_3:
      name: Alert Zone 3
      icon: mdi:map-marker-radius-outline
      collapsed: true
      description: >
        Optional warning light zone. Enable this zone, select its presence sensor, and select
        one or more lights that should flash when this zone is occupied.
      input:
        zone3_enabled:
          name: Enable Alert Zone 3
          default: false
          selector:
            boolean:

        zone3_presence_sensor:
          name: Zone 3 Presence / Occupancy Sensor
          description: >
            Optional. Presence or occupancy sensor for this zone. If left blank, this zone is
            treated as always occupied and its lights can flash whenever a matching alert triggers.
            If selected, zone lights flash when this sensor is on, unless the alert is configured
            to bypass occupancy.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        zone3_lights:
          name: Zone 3 Warning Lights
          description: >
            One or more lights assigned to this zone.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    alert_zone_4:
      name: Alert Zone 4
      icon: mdi:map-marker-radius-outline
      collapsed: true
      description: >
        Optional warning light zone. Enable this zone, select its presence sensor, and select
        one or more lights that should flash when this zone is occupied.
      input:
        zone4_enabled:
          name: Enable Alert Zone 4
          default: false
          selector:
            boolean:

        zone4_presence_sensor:
          name: Zone 4 Presence / Occupancy Sensor
          description: >
            Optional. Presence or occupancy sensor for this zone. If left blank, this zone is
            treated as always occupied and its lights can flash whenever a matching alert triggers.
            If selected, zone lights flash when this sensor is on, unless the alert is configured
            to bypass occupancy.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        zone4_lights:
          name: Zone 4 Warning Lights
          description: >
            One or more lights assigned to this zone.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    alert_zone_5:
      name: Alert Zone 5
      icon: mdi:map-marker-radius-outline
      collapsed: true
      description: >
        Optional warning light zone. Enable this zone, select its presence sensor, and select
        one or more lights that should flash when this zone is occupied.
      input:
        zone5_enabled:
          name: Enable Alert Zone 5
          default: false
          selector:
            boolean:

        zone5_presence_sensor:
          name: Zone 5 Presence / Occupancy Sensor
          description: >
            Optional. Presence or occupancy sensor for this zone. If left blank, this zone is
            treated as always occupied and its lights can flash whenever a matching alert triggers.
            If selected, zone lights flash when this sensor is on, unless the alert is configured
            to bypass occupancy.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        zone5_lights:
          name: Zone 5 Warning Lights
          description: >
            One or more lights assigned to this zone.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

    enable_control:
      name: Enable / Disable Control
      icon: mdi:toggle-switch
      collapsed: true
      description: >
        Optional helper toggle for dashboard control. Leave disabled if you always want alerts to run.
      input:
        use_enabled_helper:
          name: Use Enable Helper
          description: >
            Enable this if you want a helper toggle to control whether weather alerts run.
          default: false
          selector:
            boolean:

        enabled_helper:
          name: Enable Helper Entity
          description: >
            Optional. Select your helper toggle, such as input_boolean.weather_alerts.
            This is only used when "Use Enable Helper" is enabled.
          default: ""
          selector:
            entity:
              domain: input_boolean

    voice_and_audio:
      name: Voice, Audio & Preannounce
      icon: mdi:account-voice
      collapsed: true
      description: >
        Optional preannounce sound and volume controls for voice announcements.
      input:
        use_preannounce:
          name: Use Preannounce Sound
          description: >
            Play a sound before the voice announcement. If no custom media ID is provided,
            Home Assistant's default Assist satellite preannounce sound is used.
          default: true
          selector:
            boolean:

        custom_preannounce_media:
          name: Custom Preannounce Sound
          description: >
            Optional. Select a custom audio file from Home Assistant Media to play before
            the announcement. Leave empty to use the default Assist satellite preannounce sound.
          default: {}
          selector:
            media:
              accept:
                - audio/*

        use_voice_volume:
          name: Set Voice Alert Volume
          description: >
            Enable this if your voice assistant also exposes a media_player entity and you want
            the blueprint to set volume before announcing.
          default: false
          selector:
            boolean:

        voice_media_players:
          name: Voice Media Player Entities
          description: >
            Optional. Select media_player entities associated with your voice assistants.
            These are used only for volume control, not for the announcement itself.
          default: []
          selector:
            entity:
              domain: media_player
              multiple: true

        voice_volume_level:
          name: Voice Alert Volume
          description: >
            Announcement volume level when volume control is enabled.
          default: 0.8
          selector:
            number:
              min: 0
              max: 1
              step: 0.05
              mode: slider

        restore_voice_volume:
          name: Restore Voice Volume After Alert
          description: >
            Attempts to restore the selected media_player volume state after the alert.
            This uses a temporary Home Assistant scene.
          default: true
          selector:
            boolean:

        volume_restore_scene_id:
          name: Temporary Volume Restore Scene ID
          description: >
            Internal scene ID used to snapshot/restore selected media_player volume states.
            Usually leave this alone.
          default: before_weather_alert_voice_volume
          selector:
            text:

    mobile_notifications:
      name: Mobile Push Notifications
      icon: mdi:cellphone-message
      collapsed: true
      description: >
        Optional Home Assistant Companion App push notifications.
      input:
        send_mobile_notifications:
          name: Send Mobile Push Notifications
          description: >
            Send a Home Assistant Companion App push notification to one or more mobile devices
            when a matching weather alert is detected.
          default: false
          selector:
            boolean:

        mobile_notify_entities:
          name: Mobile Notify Entities
          description: >
            Optional. Select one or more notify entities, such as mobile app notification entities.
            These are only used when "Send Mobile Push Notifications" is enabled.
          default: []
          selector:
            entity:
              domain: notify
              multiple: true

    light_behavior:
      name: Light Behavior
      icon: mdi:led-strip-variant
      collapsed: false
      description: >
        Controls how warning lights flash and how their state is restored.
      input:
        light_flash_mode:
          name: Light Flash Mode
          description: >
            Choose Alert Colors for RGB/RGBW lights such as WLED or color bulbs.
            Choose Brightness Only for basic white/dimmable smart bulbs or mixed light groups
            where some lights may not support RGB color.
          default: alert_color
          selector:
            select:
              mode: dropdown
              options:
                - label: Alert colors - RGB/RGBW lights
                  value: alert_color
                - label: Brightness only - basic smart bulbs
                  value: brightness_only

        restore_scene_id:
          name: Temporary Light Restore Scene ID
          description: >
            Base scene ID used to snapshot/restore enabled zone light states.
            Usually leave this alone.
          default: before_weather_alert_lights
          selector:
            text:

        blink_count:
          name: Blink Count
          description: Number of on/off blinks.
          default: 8
          selector:
            number:
              min: 1
              max: 30
              step: 1
              mode: slider

        blink_delay_ms:
          name: Blink Delay
          description: Delay between on/off changes in milliseconds.
          default: 500
          selector:
            number:
              min: 100
              max: 3000
              step: 100
              mode: slider
              unit_of_measurement: ms

        brightness_pct:
          name: Flash Brightness
          description: Brightness percentage used while flashing.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

    alert_type_filters:
      name: Alert Type Filters
      icon: mdi:alert-decagram
      collapsed: true
      description: >
        Choose which NWS alert categories should trigger this automation.
      input:
        enable_tornado_warning:
          name: Trigger on Tornado Warning
          default: true
          selector:
            boolean:

        enable_tornado_watch:
          name: Trigger on Tornado Watch
          default: true
          selector:
            boolean:

        enable_severe_thunderstorm_warning:
          name: Trigger on Severe Thunderstorm Warning
          default: true
          selector:
            boolean:

        enable_severe_thunderstorm_watch:
          name: Trigger on Severe Thunderstorm Watch
          default: true
          selector:
            boolean:

        enable_flash_flood_warning:
          name: Trigger on Flash Flood Warning
          default: true
          selector:
            boolean:

        enable_flood_warning:
          name: Trigger on Flood Warning
          default: true
          selector:
            boolean:

        enable_flood_watch:
          name: Trigger on Flood Watch
          default: true
          selector:
            boolean:

        enable_winter_weather:
          name: Trigger on Winter / Snow / Ice Alerts
          default: true
          selector:
            boolean:

        enable_heat_alerts:
          name: Trigger on Heat Alerts
          default: true
          selector:
            boolean:

        enable_wind_alerts:
          name: Trigger on Wind Alerts
          default: true
          selector:
            boolean:

        enable_special_weather_statement:
          name: Trigger on Special Weather Statement
          default: false
          selector:
            boolean:

        enable_advisories:
          name: Trigger on Weather Advisories
          description: >
            Enables common advisory-level alerts such as weather advisory, wind advisory,
            winter weather advisory, heat advisory, and dense fog advisory.
          default: false
          selector:
            boolean:

        enable_other_alerts:
          name: Trigger on Other Alerts
          description: >
            If enabled, alerts that do not match one of the known categories will still trigger.
          default: false
          selector:
            boolean:

    occupancy_bypass:
      name: Occupancy Bypass
      icon: mdi:motion-sensor
      collapsed: true
      description: >
        Choose which serious alerts should flash lights even when occupancy is not detected.
      input:
        bypass_occupancy_tornado_warning:
          name: Bypass Occupancy for Tornado Warning
          description: Flash lights for Tornado Warnings even if the occupancy sensor is off.
          default: true
          selector:
            boolean:

        bypass_occupancy_severe_thunderstorm_warning:
          name: Bypass Occupancy for Severe Thunderstorm Warning
          description: Flash lights for Severe Thunderstorm Warnings even if the occupancy sensor is off.
          default: false
          selector:
            boolean:

        bypass_occupancy_flash_flood_warning:
          name: Bypass Occupancy for Flash Flood Warning
          description: Flash lights for Flash Flood Warnings even if the occupancy sensor is off.
          default: false
          selector:
            boolean:

        bypass_occupancy_all_enabled_alerts:
          name: Bypass Occupancy for All Enabled Alerts
          description: >
            If enabled, selected warning lights flash for any enabled alert type regardless of occupancy.
          default: false
          selector:
            boolean:

    alert_colors:
      name: Alert Colors
      icon: mdi:palette
      collapsed: true
      description: >
        Optional custom colors for RGB/RGBW warning lights. These are only used when Light Flash Mode
        is set to Alert colors.
      input:
        tornado_warning_color:
          name: Tornado Warning Color
          description: Alert color used for Tornado Warnings.
          default: [255, 0, 255]
          selector:
            color_rgb:

        tornado_watch_color:
          name: Tornado Watch Color
          description: Alert color used for Tornado Watches.
          default: [255, 128, 0]
          selector:
            color_rgb:

        severe_thunderstorm_warning_color:
          name: Severe Thunderstorm Warning Color
          description: Alert color used for Severe Thunderstorm Warnings.
          default: [255, 0, 0]
          selector:
            color_rgb:

        severe_thunderstorm_watch_color:
          name: Severe Thunderstorm Watch Color
          description: Alert color used for Severe Thunderstorm Watches.
          default: [255, 255, 0]
          selector:
            color_rgb:

        flash_flood_warning_color:
          name: Flash Flood Warning Color
          description: Alert color used for Flash Flood Warnings.
          default: [0, 0, 255]
          selector:
            color_rgb:

        flood_color:
          name: Flood Warning / Flood Watch Color
          description: Alert color used for Flood Warnings and Flood Watches.
          default: [0, 80, 255]
          selector:
            color_rgb:

        winter_weather_color:
          name: Winter / Snow / Ice Color
          description: Alert color used for winter, snow, ice, and blizzard alerts.
          default: [0, 255, 255]
          selector:
            color_rgb:

        heat_alert_color:
          name: Heat Alert Color
          description: Alert color used for heat and excessive heat alerts.
          default: [255, 80, 0]
          selector:
            color_rgb:

        wind_alert_color:
          name: Wind Alert Color
          description: Alert color used for wind and high wind alerts.
          default: [180, 180, 255]
          selector:
            color_rgb:

        special_weather_statement_color:
          name: Special Weather Statement Color
          description: Alert color used for Special Weather Statements.
          default: [255, 255, 255]
          selector:
            color_rgb:

        advisory_color:
          name: Advisory Color
          description: Alert color used for advisory-level alerts.
          default: [255, 255, 255]
          selector:
            color_rgb:

        other_alert_color:
          name: Other Alert Color
          description: Alert color used for alerts that do not match a known category.
          default: [255, 255, 255]
          selector:
            color_rgb:

mode: queued
max: 10

triggers:
  - trigger: state
    entity_id: !input nws_alert_sensor

variables:
  nws_sensor: !input nws_alert_sensor
  alert_attr: !input alert_attribute

  use_enabled_helper: !input use_enabled_helper
  enabled_helper: !input enabled_helper

  zone1_enabled: !input zone1_enabled
  zone1_presence_sensor: !input zone1_presence_sensor
  zone1_lights: !input zone1_lights
  zone2_enabled: !input zone2_enabled
  zone2_presence_sensor: !input zone2_presence_sensor
  zone2_lights: !input zone2_lights
  zone3_enabled: !input zone3_enabled
  zone3_presence_sensor: !input zone3_presence_sensor
  zone3_lights: !input zone3_lights
  zone4_enabled: !input zone4_enabled
  zone4_presence_sensor: !input zone4_presence_sensor
  zone4_lights: !input zone4_lights
  zone5_enabled: !input zone5_enabled
  zone5_presence_sensor: !input zone5_presence_sensor
  zone5_lights: !input zone5_lights


  use_preannounce: !input use_preannounce
  custom_preannounce_media: !input custom_preannounce_media
  custom_preannounce_media_id: >-
    {{ custom_preannounce_media.media_content_id
       if custom_preannounce_media is mapping
          and custom_preannounce_media.media_content_id is defined
       else '' }}

  send_mobile_notifications: !input send_mobile_notifications
  mobile_notify_entities: !input mobile_notify_entities

  use_voice_volume: !input use_voice_volume
  voice_media_players: !input voice_media_players
  voice_volume_level: !input voice_volume_level
  restore_voice_volume: !input restore_voice_volume

  light_flash_mode: !input light_flash_mode

  tornado_warning_color: !input tornado_warning_color
  tornado_watch_color: !input tornado_watch_color
  severe_thunderstorm_warning_color: !input severe_thunderstorm_warning_color
  severe_thunderstorm_watch_color: !input severe_thunderstorm_watch_color
  flash_flood_warning_color: !input flash_flood_warning_color
  flood_color: !input flood_color
  winter_weather_color: !input winter_weather_color
  heat_alert_color: !input heat_alert_color
  wind_alert_color: !input wind_alert_color
  special_weather_statement_color: !input special_weather_statement_color
  advisory_color: !input advisory_color
  other_alert_color: !input other_alert_color

  restore_scene_id: !input restore_scene_id
  volume_restore_scene_id: !input volume_restore_scene_id

  blink_count: !input blink_count
  blink_delay_ms: !input blink_delay_ms
  brightness_pct: !input brightness_pct

  enable_tornado_warning: !input enable_tornado_warning
  enable_tornado_watch: !input enable_tornado_watch
  enable_severe_thunderstorm_warning: !input enable_severe_thunderstorm_warning
  enable_severe_thunderstorm_watch: !input enable_severe_thunderstorm_watch
  enable_flash_flood_warning: !input enable_flash_flood_warning
  enable_flood_warning: !input enable_flood_warning
  enable_flood_watch: !input enable_flood_watch
  enable_winter_weather: !input enable_winter_weather
  enable_heat_alerts: !input enable_heat_alerts
  enable_wind_alerts: !input enable_wind_alerts
  enable_special_weather_statement: !input enable_special_weather_statement
  enable_advisories: !input enable_advisories
  enable_other_alerts: !input enable_other_alerts

  bypass_occupancy_tornado_warning: !input bypass_occupancy_tornado_warning
  bypass_occupancy_severe_thunderstorm_warning: !input bypass_occupancy_severe_thunderstorm_warning
  bypass_occupancy_flash_flood_warning: !input bypass_occupancy_flash_flood_warning
  bypass_occupancy_all_enabled_alerts: !input bypass_occupancy_all_enabled_alerts

  alerts: "{{ state_attr(nws_sensor, alert_attr) }}"

  matched_alert_event: >-
    {% set ns = namespace(event='') %}
    {% if alerts is not none and alerts | count > 0 %}
      {% for alert in alerts if ns.event == '' %}
        {% set event = alert.Event
          | default(alert.event, true)
          | default(alert.event_name, true)
          | default(alert.Title, true)
          | default(alert.title, true)
          | default('', true) %}
        {% set e = event | string %}
        {% set el = e | lower %}

        {% set is_tornado_warning = 'tornado warning' in el %}
        {% set is_tornado_watch = 'tornado watch' in el %}
        {% set is_severe_thunderstorm_warning = 'severe thunderstorm warning' in el %}
        {% set is_severe_thunderstorm_watch = 'severe thunderstorm watch' in el %}
        {% set is_flash_flood_warning = 'flash flood warning' in el %}
        {% set is_flood_warning = 'flood warning' in el and not is_flash_flood_warning %}
        {% set is_flood_watch = 'flood watch' in el %}
        {% set is_winter = 'winter storm' in el or 'winter weather' in el or 'snow' in el or 'ice' in el or 'blizzard' in el %}
        {% set is_heat = 'heat' in el or 'excessive heat' in el %}
        {% set is_wind = 'wind' in el or 'high wind' in el %}
        {% set is_special = 'special weather statement' in el %}
        {% set is_advisory = 'advisory' in el %}

        {% set known =
          is_tornado_warning or
          is_tornado_watch or
          is_severe_thunderstorm_warning or
          is_severe_thunderstorm_watch or
          is_flash_flood_warning or
          is_flood_warning or
          is_flood_watch or
          is_winter or
          is_heat or
          is_wind or
          is_special or
          is_advisory
        %}

        {% set matched =
          (enable_tornado_warning and is_tornado_warning) or
          (enable_tornado_watch and is_tornado_watch) or
          (enable_severe_thunderstorm_warning and is_severe_thunderstorm_warning) or
          (enable_severe_thunderstorm_watch and is_severe_thunderstorm_watch) or
          (enable_flash_flood_warning and is_flash_flood_warning) or
          (enable_flood_warning and is_flood_warning) or
          (enable_flood_watch and is_flood_watch) or
          (enable_winter_weather and is_winter) or
          (enable_heat_alerts and is_heat) or
          (enable_wind_alerts and is_wind) or
          (enable_special_weather_statement and is_special) or
          (enable_advisories and is_advisory) or
          (enable_other_alerts and not known)
        %}

        {% if matched %}
          {% set ns.event = e %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.event }}

  matched_alert_headline: >-
    {% set ns = namespace(headline='') %}
    {% if alerts is not none and alerts | count > 0 %}
      {% for alert in alerts if ns.headline == '' %}
        {% set event = alert.Event
          | default(alert.event, true)
          | default(alert.event_name, true)
          | default(alert.Title, true)
          | default(alert.title, true)
          | default('', true) %}
        {% set e = event | string %}
        {% set el = e | lower %}

        {% set is_tornado_warning = 'tornado warning' in el %}
        {% set is_tornado_watch = 'tornado watch' in el %}
        {% set is_severe_thunderstorm_warning = 'severe thunderstorm warning' in el %}
        {% set is_severe_thunderstorm_watch = 'severe thunderstorm watch' in el %}
        {% set is_flash_flood_warning = 'flash flood warning' in el %}
        {% set is_flood_warning = 'flood warning' in el and not is_flash_flood_warning %}
        {% set is_flood_watch = 'flood watch' in el %}
        {% set is_winter = 'winter storm' in el or 'winter weather' in el or 'snow' in el or 'ice' in el or 'blizzard' in el %}
        {% set is_heat = 'heat' in el or 'excessive heat' in el %}
        {% set is_wind = 'wind' in el or 'high wind' in el %}
        {% set is_special = 'special weather statement' in el %}
        {% set is_advisory = 'advisory' in el %}

        {% set known =
          is_tornado_warning or
          is_tornado_watch or
          is_severe_thunderstorm_warning or
          is_severe_thunderstorm_watch or
          is_flash_flood_warning or
          is_flood_warning or
          is_flood_watch or
          is_winter or
          is_heat or
          is_wind or
          is_special or
          is_advisory
        %}

        {% set matched =
          (enable_tornado_warning and is_tornado_warning) or
          (enable_tornado_watch and is_tornado_watch) or
          (enable_severe_thunderstorm_warning and is_severe_thunderstorm_warning) or
          (enable_severe_thunderstorm_watch and is_severe_thunderstorm_watch) or
          (enable_flash_flood_warning and is_flash_flood_warning) or
          (enable_flood_warning and is_flood_warning) or
          (enable_flood_watch and is_flood_watch) or
          (enable_winter_weather and is_winter) or
          (enable_heat_alerts and is_heat) or
          (enable_wind_alerts and is_wind) or
          (enable_special_weather_statement and is_special) or
          (enable_advisories and is_advisory) or
          (enable_other_alerts and not known)
        %}

        {% if matched %}
          {% set headline = alert.Headline
            | default(alert.headline, true)
            | default(alert.Description, true)
            | default(alert.description, true)
            | default('There is an active National Weather Service alert.', true) %}
          {% set ns.headline = headline | string %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.headline }}

  event_lc: "{{ matched_alert_event | lower }}"

  alert_rgb: >-
    {% if 'tornado warning' in event_lc %}
      {{ tornado_warning_color }}
    {% elif 'tornado watch' in event_lc %}
      {{ tornado_watch_color }}
    {% elif 'severe thunderstorm warning' in event_lc %}
      {{ severe_thunderstorm_warning_color }}
    {% elif 'severe thunderstorm watch' in event_lc %}
      {{ severe_thunderstorm_watch_color }}
    {% elif 'flash flood warning' in event_lc %}
      {{ flash_flood_warning_color }}
    {% elif 'flood warning' in event_lc or 'flood watch' in event_lc %}
      {{ flood_color }}
    {% elif 'winter storm' in event_lc or 'winter weather' in event_lc or 'snow' in event_lc or 'ice' in event_lc or 'blizzard' in event_lc %}
      {{ winter_weather_color }}
    {% elif 'heat' in event_lc or 'excessive heat' in event_lc %}
      {{ heat_alert_color }}
    {% elif 'wind' in event_lc or 'high wind' in event_lc %}
      {{ wind_alert_color }}
    {% elif 'special weather statement' in event_lc %}
      {{ special_weather_statement_color }}
    {% elif 'advisory' in event_lc %}
      {{ advisory_color }}
    {% else %}
      {{ other_alert_color }}
    {% endif %}

  should_bypass_occupancy: >-
    {{ bypass_occupancy_all_enabled_alerts or
       (bypass_occupancy_tornado_warning and 'tornado warning' in event_lc) or
       (bypass_occupancy_severe_thunderstorm_warning and 'severe thunderstorm warning' in event_lc) or
       (bypass_occupancy_flash_flood_warning and 'flash flood warning' in event_lc) }}

  zone1_should_flash: >-
    {{ zone1_enabled and zone1_lights | count > 0 and
       (
         should_bypass_occupancy
         or zone1_presence_sensor == ''
         or is_state(zone1_presence_sensor, 'on')
       ) }}

  zone2_should_flash: >-
    {{ zone2_enabled and zone2_lights | count > 0 and
       (
         should_bypass_occupancy
         or zone2_presence_sensor == ''
         or is_state(zone2_presence_sensor, 'on')
       ) }}

  zone3_should_flash: >-
    {{ zone3_enabled and zone3_lights | count > 0 and
       (
         should_bypass_occupancy
         or zone3_presence_sensor == ''
         or is_state(zone3_presence_sensor, 'on')
       ) }}

  zone4_should_flash: >-
    {{ zone4_enabled and zone4_lights | count > 0 and
       (
         should_bypass_occupancy
         or zone4_presence_sensor == ''
         or is_state(zone4_presence_sensor, 'on')
       ) }}

  zone5_should_flash: >-
    {{ zone5_enabled and zone5_lights | count > 0 and
       (
         should_bypass_occupancy
         or zone5_presence_sensor == ''
         or is_state(zone5_presence_sensor, 'on')
       ) }}

  should_flash_any_zone: >-
    {{ zone1_should_flash or zone2_should_flash or zone3_should_flash or zone4_should_flash or zone5_should_flash }}

  alert_message: >-
    National Weather Service alert.
    {{ matched_alert_event }}.
    {{ matched_alert_headline }}

  alert_notification_title: >-
    NWS Weather Alert: {{ matched_alert_event }}

  alert_notification_message: >-
    {{ matched_alert_headline }}

conditions:
  # Optional master enable/disable helper.
  - condition: template
    value_template: >
      {{ not use_enabled_helper
         or enabled_helper == ''
         or is_state(enabled_helper, 'on') }}

  # Only run when the alert count increases.
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.to_state.state | int(0) > trigger.from_state.state | int(0) }}

  # Make sure the alert list exists.
  - condition: template
    value_template: >
      {{ alerts is not none and alerts | count > 0 }}

  # Make sure at least one active alert matches the enabled alert categories.
  - condition: template
    value_template: >
      {{ matched_alert_event | trim != '' }}

actions:
  # Snapshot enabled zone lights before changing them.
  - if:
      - condition: template
        value_template: "{{ zone1_enabled and zone1_lights | count > 0 }}"
    then:
      - action: scene.create
        data:
          scene_id: "{{ restore_scene_id }}_zone1"
          snapshot_entities: !input zone1_lights

  - if:
      - condition: template
        value_template: "{{ zone2_enabled and zone2_lights | count > 0 }}"
    then:
      - action: scene.create
        data:
          scene_id: "{{ restore_scene_id }}_zone2"
          snapshot_entities: !input zone2_lights

  - if:
      - condition: template
        value_template: "{{ zone3_enabled and zone3_lights | count > 0 }}"
    then:
      - action: scene.create
        data:
          scene_id: "{{ restore_scene_id }}_zone3"
          snapshot_entities: !input zone3_lights

  - if:
      - condition: template
        value_template: "{{ zone4_enabled and zone4_lights | count > 0 }}"
    then:
      - action: scene.create
        data:
          scene_id: "{{ restore_scene_id }}_zone4"
          snapshot_entities: !input zone4_lights

  - if:
      - condition: template
        value_template: "{{ zone5_enabled and zone5_lights | count > 0 }}"
    then:
      - action: scene.create
        data:
          scene_id: "{{ restore_scene_id }}_zone5"
          snapshot_entities: !input zone5_lights

  # Optionally snapshot and set voice media_player volume.
  - if:
      - condition: template
        value_template: >
          {{ use_voice_volume and voice_media_players | count > 0 }}
    then:
      - if:
          - condition: template
            value_template: "{{ restore_voice_volume }}"
        then:
          - action: scene.create
            data:
              scene_id: "{{ volume_restore_scene_id }}"
              snapshot_entities: !input voice_media_players

      - action: media_player.volume_set
        target:
          entity_id: !input voice_media_players
        data:
          volume_level: "{{ voice_volume_level }}"

      - delay:
          milliseconds: 250

  # Announce the alert on selected HA Voice / Assist satellites.
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ use_preannounce and custom_preannounce_media_id | trim != '' }}
        sequence:
          - action: assist_satellite.announce
            target:
              entity_id: !input voice_satellites
            data:
              message: "{{ alert_message }}"
              preannounce: true
              preannounce_media_id: "{{ custom_preannounce_media_id }}"

      - conditions:
          - condition: template
            value_template: "{{ use_preannounce }}"
        sequence:
          - action: assist_satellite.announce
            target:
              entity_id: !input voice_satellites
            data:
              message: "{{ alert_message }}"
              preannounce: true

    default:
      - action: assist_satellite.announce
        target:
          entity_id: !input voice_satellites
        data:
          message: "{{ alert_message }}"
          preannounce: false

  # Optionally send mobile push notifications to selected notify entities.
  - if:
      - condition: template
        value_template: >
          {{ send_mobile_notifications and mobile_notify_entities | count > 0 }}
    then:
      - action: notify.send_message
        target:
          entity_id: !input mobile_notify_entities
        data:
          title: "{{ alert_notification_title }}"
          message: "{{ alert_notification_message }}"

  # Flash enabled zone lights if their zone is occupied or the alert bypasses occupancy.
  - if:
      - condition: template
        value_template: "{{ should_flash_any_zone }}"
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ light_flash_mode == 'brightness_only' }}"
            sequence:
              - repeat:
                  count: "{{ blink_count }}"
                  sequence:
                    - if:
                        - condition: template
                          value_template: "{{ zone1_should_flash }}"
                      then:
                        - action: light.turn_on
                          target:
                            entity_id: !input zone1_lights
                          data:
                            brightness_pct: "{{ brightness_pct }}"
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone2_should_flash }}"
                      then:
                        - action: light.turn_on
                          target:
                            entity_id: !input zone2_lights
                          data:
                            brightness_pct: "{{ brightness_pct }}"
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone3_should_flash }}"
                      then:
                        - action: light.turn_on
                          target:
                            entity_id: !input zone3_lights
                          data:
                            brightness_pct: "{{ brightness_pct }}"
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone4_should_flash }}"
                      then:
                        - action: light.turn_on
                          target:
                            entity_id: !input zone4_lights
                          data:
                            brightness_pct: "{{ brightness_pct }}"
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone5_should_flash }}"
                      then:
                        - action: light.turn_on
                          target:
                            entity_id: !input zone5_lights
                          data:
                            brightness_pct: "{{ brightness_pct }}"
                            transition: 0

                    - delay:
                        milliseconds: "{{ blink_delay_ms }}"

                    - if:
                        - condition: template
                          value_template: "{{ zone1_should_flash }}"
                      then:
                        - action: light.turn_off
                          target:
                            entity_id: !input zone1_lights
                          data:
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone2_should_flash }}"
                      then:
                        - action: light.turn_off
                          target:
                            entity_id: !input zone2_lights
                          data:
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone3_should_flash }}"
                      then:
                        - action: light.turn_off
                          target:
                            entity_id: !input zone3_lights
                          data:
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone4_should_flash }}"
                      then:
                        - action: light.turn_off
                          target:
                            entity_id: !input zone4_lights
                          data:
                            transition: 0

                    - if:
                        - condition: template
                          value_template: "{{ zone5_should_flash }}"
                      then:
                        - action: light.turn_off
                          target:
                            entity_id: !input zone5_lights
                          data:
                            transition: 0

                    - delay:
                        milliseconds: "{{ blink_delay_ms }}"

        default:
          - repeat:
              count: "{{ blink_count }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ zone1_should_flash }}"
                  then:
                    - action: light.turn_on
                      target:
                        entity_id: !input zone1_lights
                      data:
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ alert_rgb }}"
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone2_should_flash }}"
                  then:
                    - action: light.turn_on
                      target:
                        entity_id: !input zone2_lights
                      data:
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ alert_rgb }}"
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone3_should_flash }}"
                  then:
                    - action: light.turn_on
                      target:
                        entity_id: !input zone3_lights
                      data:
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ alert_rgb }}"
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone4_should_flash }}"
                  then:
                    - action: light.turn_on
                      target:
                        entity_id: !input zone4_lights
                      data:
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ alert_rgb }}"
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone5_should_flash }}"
                  then:
                    - action: light.turn_on
                      target:
                        entity_id: !input zone5_lights
                      data:
                        brightness_pct: "{{ brightness_pct }}"
                        rgb_color: "{{ alert_rgb }}"
                        transition: 0

                - delay:
                    milliseconds: "{{ blink_delay_ms }}"

                - if:
                    - condition: template
                      value_template: "{{ zone1_should_flash }}"
                  then:
                    - action: light.turn_off
                      target:
                        entity_id: !input zone1_lights
                      data:
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone2_should_flash }}"
                  then:
                    - action: light.turn_off
                      target:
                        entity_id: !input zone2_lights
                      data:
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone3_should_flash }}"
                  then:
                    - action: light.turn_off
                      target:
                        entity_id: !input zone3_lights
                      data:
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone4_should_flash }}"
                  then:
                    - action: light.turn_off
                      target:
                        entity_id: !input zone4_lights
                      data:
                        transition: 0

                - if:
                    - condition: template
                      value_template: "{{ zone5_should_flash }}"
                  then:
                    - action: light.turn_off
                      target:
                        entity_id: !input zone5_lights
                      data:
                        transition: 0

                - delay:
                    milliseconds: "{{ blink_delay_ms }}"

  # Restore enabled zone lights.
  - if:
      - condition: template
        value_template: "{{ zone1_enabled and zone1_lights | count > 0 }}"
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ restore_scene_id }}_zone1"

  - if:
      - condition: template
        value_template: "{{ zone2_enabled and zone2_lights | count > 0 }}"
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ restore_scene_id }}_zone2"

  - if:
      - condition: template
        value_template: "{{ zone3_enabled and zone3_lights | count > 0 }}"
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ restore_scene_id }}_zone3"

  - if:
      - condition: template
        value_template: "{{ zone4_enabled and zone4_lights | count > 0 }}"
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ restore_scene_id }}_zone4"

  - if:
      - condition: template
        value_template: "{{ zone5_enabled and zone5_lights | count > 0 }}"
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ restore_scene_id }}_zone5"

  # Optionally restore voice media_player volume.
  - if:
      - condition: template
        value_template: >
          {{ use_voice_volume and restore_voice_volume and voice_media_players | count > 0 }}
    then:
      - action: scene.turn_on
        target:
          entity_id: "scene.{{ volume_restore_scene_id }}"